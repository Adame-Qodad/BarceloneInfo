name: Mettre à jour les actualités

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'scripts/**'
      - '.github/workflows/update-news.yml'

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Récupérer les actualités RSS
        run: npm run fetch-news

      - name: Commit et push si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          if git diff --staged --quiet; then
            echo "Aucun changement détecté"
          else
            git commit -m "chore: mise à jour automatique des actualités FC Barcelone"
            git push
          fi
